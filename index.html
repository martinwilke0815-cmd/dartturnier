<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARTTURNIER ABZ POTSDAM</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#111;color:#fff}
header{background:#000;padding:20px;text-align:center;border-bottom:3px solid #c00}
h1{margin:0;color:#ff3b3b}
.container{max-width:1200px;margin:auto;padding:15px}
.card{background:#1c1c1c;padding:15px;border-radius:12px;margin-bottom:15px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
input,button,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #555;box-sizing:border-box}
input,select{background:#000;color:#fff}
button{background:#b30000;color:#fff;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #555;padding:6px;text-align:center}
.match{border:1px solid #444;padding:8px;border-radius:8px;margin:6px 0}
.dev{position:fixed;right:10px;bottom:10px;color:#888;font-size:12px}
</style>
</head>
<body>
<header><h1>🎯 DARTTURNIER ABZ POTSDAM 🎯</h1></header>
<div class="container">
<div class="card">
<h2>Spieler eingeben</h2>
<div id="players"></div>
<button onclick="drawGroups()">Gruppen auslosen</button>
<button onclick="location.reload()">Neues Turnier</button>
</div>

<div class="card" id="groups">Noch keine Gruppen ausgelost.</div>
</div>
<div class="dev">Entwickler: Martin Wilke</div>

<script>
for(let i=1;i<=8;i++){
 let inp=document.createElement('input');
 inp.placeholder='Spieler '+i;
 document.getElementById('players').appendChild(inp);
}

let groupA=[],groupB=[],results={};

function shuffle(arr){
 for(let i=arr.length-1;i>0;i--){
  let j=Math.floor(Math.random()*(i+1));
  [arr[i],arr[j]]=[arr[j],arr[i]];
 }
}

function createMatches(group,id){
 let html='';
 for(let i=0;i<group.length;i++){
   for(let j=i+1;j<group.length;j++){
      let key=id+i+j;
      html+=`<div class="match">${group[i]} vs ${group[j]}
      <select onchange="saveResult('${key}',this.value)">
      <option value="">Gewinner wählen</option>
      <option>${group[i]}</option>
      <option>${group[j]}</option>
      </select></div>`;
   }
 }
 return html;
}

function drawGroups(){
 let names=[...document.querySelectorAll('#players input')].map(x=>x.value.trim()).filter(Boolean);
 if(names.length!==8){alert('Bitte genau 8 Spieler eingeben.');return;}
 shuffle(names);
 groupA=names.slice(0,4);
 groupB=names.slice(4,8);

 document.getElementById('groups').innerHTML=`
 <div class="grid">
 <div class="card">
 <h3>Gruppe A</h3>
 ${createMatches(groupA,'A')}
 <div id="tableA"></div>
 </div>
 <div class="card">
 <h3>Gruppe B</h3>
 ${createMatches(groupB,'B')}
 <div id="tableB"></div>
 </div>
 </div>`;
 updateTable('A',groupA);
 updateTable('B',groupB);
}

function saveResult(key,val){
 results[key]=val;
 updateTable('A',groupA);
 updateTable('B',groupB);
 localStorage.setItem('dartResults',JSON.stringify(results));
}

function updateTable(id,group){
 let wins={},losses={};
 group.forEach(p=>{wins[p]=0;losses[p]=0;});

 Object.entries(results).forEach(([k,v])=>{
   if(!k.startsWith(id) || !v) return;
   let match=document.querySelector(`select[onchange="saveResult('${k}',this.value)"]`);
   if(match){
      let opts=[...match.options].slice(1).map(o=>o.value);
      let loser=opts.find(x=>x!==v);
      wins[v]++; losses[loser]++;
   }
 });

 let rows=group.map(p=>({name:p,w:wins[p],l:losses[p],pts:wins[p]*2}))
 .sort((a,b)=>b.pts-a.pts);

 let html='<table><tr><th>Platz</th><th>Spieler</th><th>S</th><th>N</th><th>Pkt</th></tr>';
 rows.forEach((r,i)=>html+=`<tr><td>${i+1}</td><td>${r.name}</td><td>${r.w}</td><td>${r.l}</td><td>${r.pts}</td></tr>`);
 html+='</table>';
 document.getElementById('table'+id).innerHTML=html;
}
</script>
</body></html>
